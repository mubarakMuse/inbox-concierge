name: Deploy AWS (lean)

on:
  push:
    branches:
      - main
      - feat/aws-lean-production
  workflow_dispatch:
    inputs:
      apply_infra:
        description: "Run terraform apply"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install and test server
        working-directory: server
        run: |
          npm ci
          npm test

      - name: Install and test client
        working-directory: client
        run: |
          npm ci
          npm test

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image (always)
        run: docker build -t inbox-api:ci ./server

      - name: Build Lambda worker image (always)
        run: docker build -f server/Dockerfile.lambda -t inbox-worker:ci ./server

      - name: Configure AWS credentials
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.ECR_API_REPOSITORY != '' }}
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push images to ECR
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.ECR_API_REPOSITORY != '' && secrets.ECR_WORKER_REPOSITORY != '' }}
        run: |
          API_URI="${{ secrets.ECR_API_REPOSITORY }}:${GITHUB_SHA}"
          WORKER_URI="${{ secrets.ECR_WORKER_REPOSITORY }}:${GITHUB_SHA}"
          docker tag inbox-api:ci "$API_URI"
          docker tag inbox-api:ci "${{ secrets.ECR_API_REPOSITORY }}:latest"
          docker tag inbox-worker:ci "$WORKER_URI"
          docker tag inbox-worker:ci "${{ secrets.ECR_WORKER_REPOSITORY }}:latest"
          docker push "$API_URI"
          docker push "${{ secrets.ECR_API_REPOSITORY }}:latest"
          docker push "$WORKER_URI"
          docker push "${{ secrets.ECR_WORKER_REPOSITORY }}:latest"

  terraform:
    needs: test
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply_infra == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform apply
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ vars.PROJECT_NAME || 'inbox-concierge' }}" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="create_apprunner=${{ vars.CREATE_APPRUNNER || 'false' }}" \
            -var="create_lambda=${{ vars.CREATE_LAMBDA || 'false' }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="db_username=${{ vars.DB_USERNAME || 'inbox' }}" \
            -var="db_name=${{ vars.DB_NAME || 'inbox' }}" \
            -var="db_instance_class=${{ vars.DB_INSTANCE_CLASS || 'db.t4g.micro' }}" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -var="openai_api_key=${{ secrets.OPENAI_API_KEY }}" \
            -var="cookie_secret=${{ secrets.COOKIE_SECRET }}" \
            -var="frontend_url=${{ vars.FRONTEND_URL || '' }}" \
            -var="oauth_redirect_uri=${{ vars.OAUTH_REDIRECT_URI || '' }}"

  frontend:
    needs: test
    if: ${{ secrets.AWS_ACCESS_KEY_ID != '' && secrets.SPA_BUCKET != '' && secrets.CLOUDFRONT_DISTRIBUTION_ID != '' && vars.VITE_API_BASE != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build client
        working-directory: client
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: |
          npm ci
          npm run build

      - name: Sync to S3 and invalidate CloudFront
        run: |
          aws s3 sync client/dist "s3://${{ secrets.SPA_BUCKET }}" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
